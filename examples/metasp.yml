metasp-systems:
  - name: tel
    description: "Meta ASP system for temporal equilibrium logic (TEL)."
    control-name: clingo
    syntax-encoding:
      - "./tel/syntax.lp"
    semantics-encoding:
      - "./tel/semantics.lp"
    printer: temporal_printer
    ui-encoding:
      - "./tel/ui.lp"
    constants:
      - "horizon"

  - name: del
    description: "Meta ASP system joining temporal equilibrium logic (TEL) with dynamic logic (DEL)."
    control-name: clingo
    syntax-encoding:
      - "./del/syntax.lp"
      - "./tel/syntax.lp"
    semantics-encoding:
      - "./del/semantics.lp"
      - "./tel/semantics.lp"
    printer: temporal_printer
    ui-encoding:
      - "./del/ui.lp"
      - "./tel/ui.lp"
    constants:
      - "horizon"

  - name: mel
    description: "Meta ASP system with for metric equilibrium logic (MEL) using clingcon as backend solver."
    control-name: clingcon
    syntax-encoding:
      - "./mel/syntax.lp"
    semantics-encoding:
      - "./mel/semantics.lp"
    ui-encoding:
      - "./melingo/ui.lp"
    python-scripts:
      - "./mel/print_functions.py"
    printer: mel_print_model
    constants:
      - "horizon"
