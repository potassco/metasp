metasp-systems:
  - name: melingo
    description: "Meta ASP system with for metric equilibrium logic (MEL) using clingcon as backend solver."
    control-name: clingcon
    syntax-encoding:
      - "./melingo/syntax.lp"
    semantics-encoding:
      - "./melingo/semantics.lp"
    ui-encoding:
      - "./melingo/ui.lp"
    python-scripts:
      - "./melingo/print_functions.py"
    print-model: melingo_print_model
    constants:
      - "horizon"

  - name: telingo
    description: "Meta ASP system for temporal equilibrium logic (TEL)."
    control-name: clingo
    syntax-encoding:
      - "./telingo/syntax.lp"
    semantics-encoding:
      - "./telingo/semantics.lp"
    print-model: telingo_print_model
    constants:
      - "horizon"

  - name: delingo
    description: "Meta ASP system joining temporal equilibrium logic (TEL) with dynamic logic (DEL)."
    control-name: clingo
    syntax-encoding:
      - "./telingo/syntax.lp"
      - "./delingo/syntax.lp"
    semantics-encoding:
      - "./telingo/semantics.lp"
      - "./delingo/semantics.lp"
    print-model: telingo_print_model
    constants:
      - "horizon"

  - name: thtc
    description: "Meta ASP system for THTc"
    control-name: fclingo
    syntax-encoding:
      - "./thtc/syntax.lp"
      - "./telingo/syntax.lp"
    semantics-encoding:
      - "./thtc/semantics.lp"
      - "./telingo/semantics.lp"
    ui-encoding:
      - "./thtc/ui.lp"
    print-model: thtc_print_model
    python-scripts:
      - "./thtc/print_functions.py"
    constants:
      - "horizon"
