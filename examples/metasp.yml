metasp-systems:
  - name: melingo
    solver: clingcon
    syntax-encoding:
      - "./melingo/syntax.lp"
    semantics-encoding:
      - "./melingo/semantics.lp"
    python-scripts:
      - "./melingo/print_functions.py"
    print-model: melingo_print_model
    constants:
      - "horizon"

  - name: telingo
    solver: clingo
    syntax-encoding:
      - "./telingo/syntax.lp"
    semantics-encoding:
      - "./telingo/semantics.lp"
    print-model: telingo_print_model
    constants:
      - "horizon"

  - name: delingo
    solver: clingo
    syntax-encoding:
      - "./telingo/syntax.lp"
      - "./delingo/syntax.lp"
    semantics-encoding:
      - "./telingo/semantics.lp"
      - "./delingo/semantics.lp"
    print-model: telingo_print_model
    constants:
      - "horizon"
